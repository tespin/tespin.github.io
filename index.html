<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <title>perennial</title>
        <link rel="stylesheet" type="text/css" href="css/style.css"/>
    </head>
    <body>
        <div id="altitude" style="color:white"></div>
        <div id="azimuth" style="color:white"></div>
        <div id="coords" style="color:white">(34.0603284, -118.3573433)</div>
        <script src="js/moment.min.js"></script>
        <script src="js/suncalc.js"></script>
        <script src="js/three.min.js"></script>
        <script src="js/GLTFLoader.js"></script>
        <script>
            var map = function(value, istart, istop, ostart, ostop) {
                return ostart + (ostop - ostart) * ((value - istart) / (istop - istart));

            };

            var scene = new THREE.Scene();
            var camera = new THREE.PerspectiveCamera( 75, window.innerWidth/window.innerHeight, 0.1, 1000 );
            //camera.position.set(225, 50, 225);
            camera.position.set(0, 50,-300);
            camera.lookAt(scene.position.x, scene.position.y+125, scene.position.z);
            scene.add(camera);

            //var axesHelper = new THREE.AxesHelper(200);
            //scene.add(axesHelper);

            var renderer = new THREE.WebGLRenderer();
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.shadowMap.enabled = true;
            renderer.shadowMapSoft = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild( renderer.domElement );

            var dirColor = new THREE.Color("hsl(209, 98%, 41%)");
            var light = new THREE.DirectionalLight(dirColor);
            light.position.set(-190, 125, -75);
            //light.target.position.copy(scene.position);
            //scene.add(new THREE.DirectionalLightHelper(light, 1.5));
            light.castShadow = true;
            light.shadow.camera.bottom = -150;
            light.shadow.camera.top = 150;
            light.shadow.camera.left = 150;
            light.shadow.camera.right = -150;
            light.shadow.camera.far = 1000;
            light.shadow.mapSize = new THREE.Vector2(1024, 1024);
            scene.add(light);

            var hemisphere = new THREE.HemisphereLight(0xffffff, 0xffffff, 1.3);
            var col = new THREE.Color("hsl(210, 60%, 53%)");
            var groundCol = new THREE.Color("hsl(210, 98%, 33%)");
            hemisphere.color = col;
            hemisphere.groundColor = groundCol;
            hemisphere.position.set(0, 150, 0);
            scene.add(hemisphere);

            //var cameraHelper = new THREE.CameraHelper(light.shadow.camera);
            //scene.add(cameraHelper);

            var geometry = new THREE.BoxGeometry( 5, 5, 70);
            var material = new THREE.MeshLambertMaterial( { color: 0x00ff00 } );
            var box = new THREE.Mesh( geometry, material );
            box.position.set(10, 40, 10);
            box.castShadow = true;
            //scene.add(box);

            var groundGeom = new THREE.BoxGeometry(100, 1, 100);
            var groundMat = new THREE.MeshLambertMaterial( {color: 0xff0000});
            var ground = new THREE.Mesh(groundGeom, groundMat);
            ground.position.set(0, 5, 0);
            ground.receiveShadow = true;
            //scene.add(ground);

            var loader = new THREE.GLTFLoader();
            loader.load('assets/gltf/zremeshed4.glb', function(gltf) {
                model = gltf.scene.children[2];
                model.position.set(0, -15, 0);
                model.rotation.z = (4*Math.PI)/3;
                model.castShadow = true;
                model.receiveShadow = true;
                light.target = model;
                scene.add(light.target);
                scene.add(model);
            }, undefined, function(error) {
                console.error(error);
            });

            var current = Date.now();
            var midnight = moment().startOf('day');
            var elapsed = current.diff(midnight);
            var interval = 4380000;
            var intervalsPassed = Math.floor(elapsed / interval);
            var start = midnight.milliseconds() + ((intervalsPassed+1) * interval);

            var timer = function() {
                var elapsedTime = Date.now() - start;
                console.log(elapsedTime);
                if (elapsedTime > interval)
                {
                    console.log("next hour")
                    start = Date.now();
                }
            }

                //             var current = moment();
                // var midnight = moment().startOf('day');
                // var elapsed = current.diff(midnight);
                // var interval = 4380000;
                // var intervalsPassed = Math.floor(elapsed / interval);

                // var istart = midnight.milliseconds() + ((intervalsPassed+1) * interval);
                // var istop = istart + interval;
                // console.log(istop);

                // var mapped = map(current, istart, istop, 0, 4380)

            var calcSun = function() {
                requestAnimationFrame(calcSun);

                // var d = new Date(), e = new Date(d);
                // var msSinceMidnight = e - d.setHours(0, 0, 0, 0);
                // // console.log(msSinceMidnight);

                // var mappedMs = map(msSinceMidnight, 0, 86400000, 0, 4380000);
                
                // var elapsed = Math.floor(d.getTime() + mappedMs);
                // console.log(new Date(elapsed));

                // var current = moment();
                // var midnight = moment().startOf('day');
                // var elapsed = current.diff(midnight);
                // var interval = 4380000;
                // var intervalsPassed = Math.floor(elapsed / interval);

                // var istart = midnight.milliseconds() + ((intervalsPassed+1) * interval);
                // var istop = istart + interval;
                // console.log(istop);

                // var mapped = map(current, istart, istop, 0, 4380)


                var sunPos = SunCalc.getPosition(new Date(), 34.1, -118.4);
                // var sunPos = SunCalc.getPosition(new Date(elapsed), 34.1, -118.4);
                var altDeg = sunPos.altitude * 180 / Math.PI;
                var aziDeg = (sunPos.azimuth + Math.PI) * 180 / Math.PI;

                var altitudeRadius = 600;
                var azimuthRadius = 50;

                var lightX = Math.cos(sunPos.azimuth + Math.PI) * Math.sin(sunPos.azimuth + Math.PI) * azimuthRadius;
                var lightY = Math.cos((Math.PI/2) - sunPos.altitude) * altitudeRadius;
                var lightZ = Math.sin(sunPos.azimuth + Math.PI) * Math.sin(sunPos.azimuth + Math.PI) * azimuthRadius;

                light.position.x = lightX;
                light.position.y = lightY;
                light.position.z = lightZ;

                //console.log(sunPos.altitude * 180 / Math.PI);
                document.getElementById("altitude").innerHTML = "Altitude: " + altDeg.toFixed(2) + "&deg;";
                document.getElementById("azimuth").innerHTML = "Azimuth: " + aziDeg.toFixed(2) + "&deg;";

                renderer.render(scene, camera);

            };
            calcSun();

            var onWindowResize = function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();

                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            window.addEventListener('resize', onWindowResize, false);

        </script>
    </body>
</html>
