<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>perennial</title>
        <style>
            body { margin: 0; }
            canvas {display: block; }
        </style>
    </head>
    <body>
        <script src="js/three.min.js"></script>
        <script src="js/GLTFLoader.js"></script>
        <script>
            var scene = new THREE.Scene();
            var camera = new THREE.PerspectiveCamera( 75, window.innerWidth/window.innerHeight, 0.1, 1000 );
            camera.position.set(225, 150, 225);
            camera.lookAt(scene.position.x, scene.position.y+100, scene.position.z);
            scene.add(camera);

            var renderer = new THREE.WebGLRenderer();
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.shadowMapEnabled = true;
            renderer.shadowMapSoft = true;
            renderer.shadowMapType = THREE.PCFSoftShadowMap;
            document.body.appendChild( renderer.domElement );

            var light = new THREE.DirectionalLight(0xffffff);
            light.position.set(100, 325, 35);
            <!--light.target.position.copy(scene.position);-->
            scene.add(new THREE.DirectionalLightHelper(light, 2.5));
            light.castShadow = true;
            light.shadow.camera.bottom = -125;
            light.shadow.camera.top = 125;
            light.shadow.camera.left = 125;
            light.shadow.camera.right = -125;
            scene.add(light);

            var cameraHelper = new THREE.CameraHelper(light.shadow.camera);
            scene.add(cameraHelper);

            var geometry = new THREE.BoxGeometry( 5, 5, 70);
            var material = new THREE.MeshLambertMaterial( { color: 0x00ff00 } );
            var box = new THREE.Mesh( geometry, material );
            box.position.set(10, 40, 10);
            box.castShadow = true;
            <!--scene.add(box);-->

            var groundGeom = new THREE.BoxGeometry(100, 1, 100);
            var groundMat = new THREE.MeshLambertMaterial( {color: 0xff0000});
            var ground = new THREE.Mesh(groundGeom, groundMat);
            ground.position.set(0, 5, 0);
            ground.receiveShadow = true;
            scene.add(ground);

            var loader = new THREE.GLTFLoader();
            loader.load('assets/gltf/zremeshed4.glb', function(gltf) {
                model = gltf.scene.children[2];
                model.castShadow = true;
                model.receiveShadow = true;
                light.target = model;
                scene.add(light.target);
                scene.add(model);
            }, undefined, function(error) {
                console.error(error);
            });

            

            var animate = function () {
	        requestAnimationFrame( animate );

  	        box.rotation.x += 0.01;
	        box.rotation.y += 0.01;

                renderer.render( scene, camera );
            };
            animate();
        </script>
    </body>
</html>
