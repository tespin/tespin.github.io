  <script src="https://unpkg.com/bindery"></script>
  <script>
    Bindery.makeBook({
      content: '#content',
      view: Bindery.View.FLIPBOOK,
      pageSetup: {
        size: { width: '6in', height: '6in' },
        margin: { top: '12pt', inner: '12pt', outer: '12pt', bottom: '12pt' },
      },
      rules: [
        Bindery.FullBleedPage({ 
          selector: '.full-bleed',
          continue: 'next'
        }),
        // Bindery.PageBreak({
        //   selector: 'p',
        //   position: 'before'
        // }),
        Bindery.FullBleedSpread({
        	selector: '.spread',
        	continue: 'next'
        }),
        Bindery.PageBreak({
          selector: '.break',
          position: 'both'
        }),
        Bindery.RunningHeader({
          render: (page) => {
            if (page.isEmpty || page.number <= 1) return '';
            if (page.isRight) {
              return `${page.number-3}`;
            } else if (page.isLeft) {
              return `${page.number-3}`;
            }
          }
        }),
        // Bindery.RunningHeader({
        //   render: (pageInfo) => pageInfo.isLeft
        //     ? `${pageInfo.number} · ${pageInfo.heading.h1}`
        //     : `${pageInfo.heading.h2} · ${pageInfo.number}`
        // })

      ],
    });
  </script>
